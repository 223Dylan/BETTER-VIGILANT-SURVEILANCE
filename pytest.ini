[pytest]
testpaths = tests
pythonpath = .
addopts = -v --tb=short --strict-markers --disable-warnings --import-mode=importlib --rootdir=.
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
norecursedirs = node_modules .venv build .git __pycache__ .pytest_cache
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
