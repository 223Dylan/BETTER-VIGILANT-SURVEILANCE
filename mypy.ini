[mypy]
# Global options - Very lenient for existing codebase
python_version = 3.12
warn_return_any = False
warn_unused_configs = False
disallow_untyped_calls = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False
disallow_untyped_decorators = False
no_implicit_optional = False
warn_redundant_casts = False
warn_unused_ignores = False
warn_no_return = False
warn_unreachable = False
strict_equality = False
ignore_missing_imports = True
follow_imports = silent

# Additional lenient settings
allow_redefinition = True
allow_untyped_globals = True
implicit_reexport = True
strict_optional = False
show_error_codes = True
show_column_numbers = True

# Disable most warnings for existing code
disable_error_code = arg-type,assignment,operator,misc,type-arg,attr-defined,var-annotated,name-defined,call-overload,annotation-unchecked,return-value,index,import-untyped

# Per-module options for stricter checking on new modules
[mypy-src.new_modules.*]
disallow_untyped_defs = True
check_untyped_defs = True

# Ignore specific problematic modules for now
[mypy-main]
ignore_errors = True

[mypy-api_server]
ignore_errors = True

[mypy-src.tasks]
ignore_errors = True

[mypy-scripts.*]
ignore_errors = True
