name: Code Quality

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for better analysis
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install bandit safety pylint autopep8 vulture
        
    - name: Install Node dependencies
      run: npm ci
      
    # Python Code Quality Checks
    - name: Security scan with Bandit
      run: bandit -r src/ -f json -o bandit-report.json || true
      
    - name: Check for security vulnerabilities with Safety
      run: safety check --json --output safety-report.json || true
      
    - name: Run Pylint
      run: pylint src/ --output-format=json --reports=no > pylint-report.json || true
      
    - name: Find dead code with Vulture
      run: vulture src/ --min-confidence 80 > vulture-report.txt || true
      
    # Frontend Code Quality Checks
    - name: Run TypeScript compiler check
      run: npx tsc --noEmit
      
    - name: Check for unused dependencies
      run: npx depcheck --json > depcheck-report.json || true
      
    - name: Bundle size analysis
      run: |
        CI=false npm run build
        npx bundlesize || true
        
    # Generate Code Quality Report
    - name: Generate code quality summary
      run: |
        echo "## Code Quality Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Python metrics
        echo "### Python Analysis" >> $GITHUB_STEP_SUMMARY
        echo "- **Security issues found:** $(jq '.results | length' bandit-report.json 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
        echo "- **Vulnerabilities found:** $(jq '.vulnerabilities | length' safety-report.json 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
        echo "- **Pylint score:** $(jq '.[] | select(.type=="convention") | .message' pylint-report.json 2>/dev/null | wc -l || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
        
        # Frontend metrics
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Frontend Analysis" >> $GITHUB_STEP_SUMMARY
        echo "- **TypeScript compilation:** PASSED" >> $GITHUB_STEP_SUMMARY
        echo "- **Unused dependencies:** $(jq '.dependencies | length' depcheck-report.json 2>/dev/null || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
        
    - name: Upload code quality artifacts
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports
        path: |
          bandit-report.json
          safety-report.json
          pylint-report.json
          vulture-report.txt
          depcheck-report.json

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=223Dylan_BETTER-VIGILANT-SURVEILANCE
          -Dsonar.organization=223dylan
          -Dsonar.sources=src
          -Dsonar.language=py,js,ts
          -Dsonar.inclusions=**/*.py,**/*.js,**/*.ts,**/*.tsx
          -Dsonar.exclusions=**/node_modules/**,**/tests/** 