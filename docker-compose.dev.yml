# =============================================================================
# SHOPLIFTING DETECTION SYSTEM - DEVELOPMENT INFRASTRUCTURE
# =============================================================================
# This docker-compose file runs only the infrastructure services
# The main application runs locally for development

services:
  # Database
  postgres:
    image: postgres:15
    container_name: shoplifting_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=shoplifting_detection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Broker
  redis:
    image: redis:latest
    container_name: shoplifting_redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # Search Engine (Optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    container_name: shoplifting_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - network.host=0.0.0.0
      - http.port=9200
      - http.cors.enabled=true
      - http.cors.allow-origin="*"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Log Processing (Optional)
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.1
    container_name: shoplifting_logstash
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5000:5000"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - app-network

  # Dashboard (Optional)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.1
    container_name: shoplifting_kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    name: shoplifting_network
    driver: bridge

volumes:
  postgres_data:
    name: shoplifting_postgres_data
    driver: local
  redis_data:
    name: shoplifting_redis_data
    driver: local
  elasticsearch_data:
    name: shoplifting_elasticsearch_data
    driver: local 