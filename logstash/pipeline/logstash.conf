input {
  tcp {
    port => 5000
    codec => json_lines
  }
  udp {
    port => 5000
    codec => json_lines
  }
  beats {
    port => 5044
  }
}

filter {
  # Parse detection metrics
  if [type] == "detection_metrics" {
    mutate {
      add_field => {
        "[@metadata][target_index]" => "detection-metrics-%{+YYYY.MM.dd}"
      }
    }
    
    # Parse confidence levels for easier visualization
    if [prediction][confidence] {
      ruby {
        code => "
          confidence = event.get('[prediction][confidence]')
          if confidence.is_a?(Numeric)
            if confidence >= 0.9
              event.set('confidence_level', 'critical')
            elsif confidence >= 0.7
              event.set('confidence_level', 'high')
            elsif confidence >= 0.5
              event.set('confidence_level', 'medium')
            else
              event.set('confidence_level', 'low')
            end
          end
        "
      }
    }
    
    # Add detection outcome field for easier filtering
    if [prediction][is_shoplifting] {
      mutate { add_field => { "detection_outcome" => "shoplifting" } }
    } else {
      mutate { add_field => { "detection_outcome" => "normal" } }
    }
  }
  
  # Parse system performance metrics
  if [type] == "system_performance" {
    mutate {
      add_field => {
        "[@metadata][target_index]" => "system-performance-%{+YYYY.MM.dd}"
      }
    }
    
    # Add performance status based on FPS
    if [performance][fps_actual] and [performance][fps_target] {
      ruby {
        code => "
          fps_actual = event.get('[performance][fps_actual]')
          fps_target = event.get('[performance][fps_target]')
          
          if fps_actual.is_a?(Numeric) and fps_target.is_a?(Numeric)
            if fps_actual >= fps_target
              event.set('fps_status', 'optimal')
            elsif fps_actual >= (fps_target * 0.8)
              event.set('fps_status', 'good')
            elsif fps_actual >= (fps_target * 0.5)
              event.set('fps_status', 'degraded')
            else
              event.set('fps_status', 'poor')
            end
          end
        "
      }
    }
  }
  
  # Parse camera health metrics
  if [type] == "camera_health" {
    mutate {
      add_field => {
        "[@metadata][target_index]" => "camera-health-%{+YYYY.MM.dd}"
      }
    }
  }
  
  # Parse detection analytics
  if [type] == "detection_analytics" {
    mutate {
      add_field => {
        "[@metadata][target_index]" => "detection-analytics-%{+YYYY.MM.dd}"
      }
    }
  }
  
  # Legacy camera logs (keep existing functionality)
  if [type] == "camera" {
    mutate {
      add_field => {
        "[@metadata][target_index]" => "camera-system-%{+YYYY.MM.dd}"
      }
    }
  }
  
  # System metrics (keep existing functionality)
  if [type] == "system_metrics" {
    mutate {
      add_field => {
        "[@metadata][target_index]" => "system-metrics-%{+YYYY.MM.dd}"
      }
    }
  }
  
  # Parse timestamp
  date {
    match => [ "@timestamp", "ISO8601" ]
    target => "@timestamp"
  }
  
  # Add geo-location if camera has location data
  if [camera_location] {
    mutate {
      add_field => { "[location][lat]" => "%{[camera_location][lat]}" }
      add_field => { "[location][lon]" => "%{[camera_location][lon]}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][target_index]}"
    template_name => "detection_system"
    template => "/etc/logstash/templates/detection_system_template.json"
    template_overwrite => true
  }
  
  # Debug output (optional - remove in production)
  if [type] in ["detection_metrics", "system_performance", "camera_health"] {
    stdout { 
      codec => rubydebug 
    }
  }
} 