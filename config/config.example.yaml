# =============================================================================
# SHOPLIFTING DETECTION SYSTEM - MAIN CONFIGURATION
# =============================================================================
# Copy this file to config/config.yaml and customize for your environment

# =============================================================================
# MODEL CONFIGURATION
# =============================================================================
model:
  # Path to the LRCN model file
  path: "models/lrcn_160S_90_90Q.h5"

  # Model input parameters
  sequence_length: 160
  frame_size: 90
  input_shape: [160, 90, 90, 1]

  # Model performance settings
  use_gpu: false
  batch_size: 1
  enable_model_caching: true

# =============================================================================
# FRAME PROCESSING CONFIGURATION
# =============================================================================
preprocessing:
  # Basic preprocessing (always enabled for LRCN model)
  grayscale: true
  resize_width: 90
  resize_height: 90
  normalize: true

  # Advanced preprocessing (optional - can improve accuracy but reduces performance)
  background_removal: false
  shadow_removal: false
  shadow_threshold: 10
  gaussian_blur: false
  blur_kernel_size: 5

  # Color adjustments
  brightness: 1.0
  contrast: 1.0

  # Data augmentation (for training/testing)
  augmentation:
    enabled: false
    horizontal_flip: true
    rotation_probability: 0.5
    rotation_angle: 30
    noise_probability: 0.2

# =============================================================================
# PROCESSING PIPELINE SETTINGS
# =============================================================================
processing:
  # Performance settings
  use_gpu: false
  skip_frames: 0  # Number of frames to skip (0 = process all frames)
  max_queue_size: 50
  processing_threads: 4

  # Detection thresholds
  probability_thresholds:
    low: 0.3
    medium: 0.6
    high: 0.8

  # Alert settings
  alert_settings:
    cooldown_period: 60  # seconds between alerts for same camera
    max_alerts_per_minute: 5
    auto_dismiss_threshold: 0.2  # Auto-dismiss alerts below this confidence

  # Frame buffer settings
  frame_buffer:
    max_size: 160  # Must match model sequence_length
    timeout: 10  # seconds to wait for complete sequence

# =============================================================================
# CAMERA CONFIGURATION
# =============================================================================
cameras:
  # Default camera settings (applied to all cameras unless overridden)
  defaults:
    fps: 15
    resolution_width: 640
    resolution_height: 480
    timeout: 5.0
    retry_attempts: 3
    retry_delay: 5

  # Individual camera configurations
  # Add your cameras here following this example:
  #
  # example_cameras:
  #   usb_camera_1:
  #     name: "Front Door Camera"
  #     source: 0  # USB camera index
  #     source_type: "usb"
  #     location: "Front Entrance"
  #     zone: "entrance"
  #     enabled: true
  #     detection_enabled: true
  #     detection_sensitivity: 0.6
  #
  #   ip_camera_1:
  #     name: "Checkout Camera 1"
  #     source: "rtsp://username:password@192.168.1.100:554/stream"
  #     source_type: "rtsp"
  #     location: "Checkout Area"
  #     zone: "checkout"
  #     enabled: true
  #     detection_enabled: true
  #     detection_sensitivity: 0.7

# =============================================================================
# VIDEO STREAMING SETTINGS
# =============================================================================
streaming:
  # Enable/disable streaming protocols
  enable_hls: true
  enable_mjpeg: true

  # HLS settings
  hls:
    segment_duration: 2  # seconds
    playlist_size: 5

  # MJPEG settings
  mjpeg:
    quality: 85
    fps: 15

  # Stream buffer settings
  buffer_size: 50
  max_clients: 10

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
database:
  # Connection settings (can be overridden by environment variables)
  host: "localhost"
  port: 5432
  name: "shoplifting_detection"
  user: "postgres"
  password: "password"

  # Connection pool settings
  pool_size: 20
  max_overflow: 30
  pool_timeout: 30
  pool_recycle: 3600

  # Migration settings
  auto_migrate: true
  backup_before_migration: true

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
logging:
  # Log levels: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"

  # Log file settings
  file:
    enabled: true
    path: "logs/main.log"
    max_size_mb: 10
    backup_count: 5

  # Console logging
  console:
    enabled: true
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Specific logger settings
  loggers:
    detection: "INFO"
    camera: "INFO"
    api: "INFO"
    database: "WARNING"
    performance: "INFO"

# =============================================================================
# MONITORING AND METRICS
# =============================================================================
monitoring:
  # System monitoring
  enabled: true
  interval: 60  # seconds

  # Metrics collection
  collect_system_metrics: true
  collect_detection_metrics: true
  collect_camera_metrics: true
  collect_api_metrics: true

  # ELK stack integration
  elk:
    enabled: true
    elasticsearch_url: "http://localhost:9200"
    logstash_host: "localhost"
    logstash_port: 5000
    index_prefix: "shoplifting-detection"

# =============================================================================
# SECURITY SETTINGS
# =============================================================================
security:
  # Authentication
  jwt:
    secret_key: "change-this-secret-key-in-production"
    access_token_expire_minutes: 30
    refresh_token_expire_days: 7
    algorithm: "HS256"

  # Encryption
  encryption:
    enabled: true
    password: "change-this-encryption-password"
    salt: "change-this-encryption-salt"

  # Rate limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 60
    requests_per_second: 10

  # CORS settings
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "http://localhost:8080"
    allow_credentials: true

# =============================================================================
# API SERVER SETTINGS
# =============================================================================
api:
  # Server configuration
  host: "0.0.0.0"
  port: 8001
  workers: 4
  debug: true
  reload: true

  # Documentation
  docs_url: "/docs"
  redoc_url: "/redoc"
  openapi_url: "/openapi.json"

  # Request/Response settings
  max_request_size: 100  # MB
  request_timeout: 300  # seconds

  # WebSocket settings
  websocket:
    enabled: true
    max_connections: 100
    heartbeat_interval: 30

# =============================================================================
# NOTIFICATION SETTINGS
# =============================================================================
notifications:
  # Email notifications
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: "your-email@gmail.com"
    password: "your-app-password"
    from_address: "your-email@gmail.com"
    to_addresses:
      - "admin@yourcompany.com"

  # Webhook notifications
  webhook:
    enabled: false
    url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    timeout: 10
    retry_attempts: 3

  # Push notifications
  push:
    enabled: false
    # Add push notification service configuration here

# =============================================================================
# DEVELOPMENT SETTINGS
# =============================================================================
development:
  # Enable development features
  debug_mode: true
  auto_reload: true

  # Mock/testing settings
  use_mock_cameras: false
  use_mock_model: false
  generate_test_data: false

  # Development tools
  enable_profiling: false
  enable_sql_echo: false

  # Sample data
  create_sample_cameras: true
  create_sample_users: true

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================
performance:
  # Memory management
  max_memory_usage_mb: 2048
  gc_threshold: 1000

  # Threading
  max_threads: 10
  thread_pool_size: 4

  # Caching
  enable_caching: true
  cache_size: 1000
  cache_ttl: 300  # seconds

  # Frame processing optimization
  frame_skip_on_high_load: true
  dynamic_quality_adjustment: true

  # Database optimization
  use_connection_pooling: true
  enable_query_caching: true
