# Global configuration for shoplifting detection system
# Cameras are managed in the database - this file contains only global settings

# Model configuration
model:
  path: "models/lrcn_160S_90_90Q.h5"
  sequence_length: 160
  frame_size: 90
  input_shape: [160, 90, 90, 1]

# NOTE: Preprocessing is now hardcoded in frame_processor.py to match notebook
# Pipeline: frame_diff → blur(3x3) → resize → grayscale → normalize
# No configuration needed - all steps are fixed for model compatibility

# Processing configuration
processing:
  use_gpu: false
  skip_frames: 0
  probability_thresholds:
    low: 0.3
    medium: 0.6
    high: 0.8

# Logging configuration
logging:
  level: "INFO"
  file: "logs/main.log"
  max_size: "10MB"
  rotation: "1 day"
  retention: "7 days"

# Server configuration
server:
  host: "0.0.0.0"
  port: 8001
